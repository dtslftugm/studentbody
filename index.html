<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Mahasiswa Aktif</title>
  <!-- Tailwind CSS untuk tampilan elegan -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js untuk visualisasi grafik interaktif -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

  <div class="container mx-auto p-6 max-w-6xl">
    <!-- Header -->
    <header class="mb-8 border-b pb-4">
      <h1 class="text-3xl font-extrabold text-blue-900">Dashboard Mahasiswa Aktif</h1>
      <p class="text-slate-500">Visualisasi data interaktif dari Google Sheets</p>
    </header>

<!-- Filter Interaktif -->
<div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-6 items-center">
  <div>
    <label class="block text-sm font-semibold text-slate-600 mb-1">Pilih Periode Semester:</label>
    <select id="periodeFilter" class="border rounded-lg px-3 py-2 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none w-64" onchange="updateProdiDropdown(); updateCharts();">
      <!-- Terisi otomatis oleh API -->
    </select>
  </div>
  <div>
    <label class="block text-sm font-semibold text-slate-600 mb-1">Pilih Program Studi:</label>
    <select id="prodiFilter" class="border rounded-lg px-3 py-2 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none w-64" onchange="updateCharts()">
      <option value="ALL">Semua Program Studi</option>
    </select>
  </div>
</div>

    <!-- Grid Visualisasi -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Card Chart Bulan -->
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <h2 class="text-lg font-bold text-slate-700 mb-4">Tren Pendaftaran per Bulan</h2>
        <div class="h-80">
          <canvas id="chartBulan"></canvas>
        </div>
      </div>

      <!-- Card Chart Angkatan -->
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <h2 class="text-lg font-bold text-slate-700 mb-4">Distribusi per Angkatan</h2>
        <div class="h-80">
          <canvas id="chartAngkatan"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // MASUKKAN URL WEB APP APPS SCRIPT 
    const API_URL = "https://script.google.com/macros/s/AKfycbzh-FhdPmNgUrNS1thjjJbOlO9J5bt4t6axcEX6UBgw1pW5bO7f1dkhVPlsisAUOZCh/exec"; 

    let globalData = null;
    let currentSheetData = null;
    let chartBulanInstance = null;
    let chartAngkatanInstance = null;
    
    function fetchData() {
      const callbackName = 'jsonpCallback_' + Math.round(100000 * Math.random());
      
      window[callbackName] = function(data) {
        globalData = data;
        
        if (globalData.error) {
          console.error(globalData.error);
          return;
        }
    
        // 1. Mengisi pilihan Periode Semester secara dinamis dari seluruh sheet yang terdeteksi
        const periodeSelect = document.getElementById('periodeFilter');
        periodeSelect.innerHTML = "";
        
        globalData.sheetsAvailable.forEach(sheetName => {
          const option = document.createElement('option');
          option.value = sheetName;
          option.textContent = sheetName;
          periodeSelect.appendChild(option);
        });
    
        // Jalankan inisialisasi awal dashboard
        updateProdiDropdown();
        updateCharts();
        
        document.body.removeChild(script);
        delete window[callbackName];
      };
    
      const script = document.createElement('script');
      script.src = API_URL + "?callback=" + callbackName;
      document.body.appendChild(script);
    }
    
    function updateProdiDropdown() {
      const selectedSheet = document.getElementById('periodeFilter').value;
      currentSheetData = globalData.data[selectedSheet];
    
      const prodiSelect = document.getElementById('prodiFilter');
      // Simpan pilihan prodi yang dipilih saat ini agar tidak ter-reset ke "ALL" saat ganti periode
      const previousSelection = prodiSelect.value; 
    
      const prodis = currentSheetData.pivotBulan.map(item => item["Program Studi"]);
      
      prodiSelect.innerHTML = '<option value="ALL">Semua Program Studi</option>';
      prodis.forEach(prodi => {
        if(prodi && prodi !== "Grand Total" && prodi.trim() !== "") { 
          const option = document.createElement('option');
          option.value = prodi;
          option.textContent = prodi;
          prodiSelect.appendChild(option);
        }
      });
    
      // Kembalikan pilihan prodi sebelumnya jika pilihan tersebut tersedia di sheet baru
      if ([...prodiSelect.options].some(o => o.value === previousSelection)) {
        prodiSelect.value = previousSelection;
      }
    }
    
    function updateCharts() {
      if (!currentSheetData) return;
    
      const selectedProdi = document.getElementById('prodiFilter').value;
    
      // --- 1. PROSES CHART TREN BULANAN ---
      let dataBulan = currentSheetData.pivotBulan;
      if (selectedProdi !== "ALL") {
        dataBulan = dataBulan.filter(item => item["Program Studi"] === selectedProdi);
      } else {
        dataBulan = dataBulan.filter(item => item["Program Studi"] && item["Program Studi"] !== "Grand Total");
      }
      
      const bulanKeys = Object.keys(dataBulan[0]).filter(key => key !== "Program Studi");
      const bulanValues = bulanKeys.map(key => {
        if (selectedProdi !== "ALL") {
          return Number(dataBulan[0][key] || 0);
        } else {
          return dataBulan.reduce((sum, item) => sum + Number(item[key] || 0), 0);
        }
      });
    
      if (chartBulanInstance) chartBulanInstance.destroy();
      const ctxBulan = document.getElementById('chartBulan').getContext('2d');
      chartBulanInstance = new Chart(ctxBulan, {
        type: 'line',
        data: {
          labels: bulanKeys,
          datasets: [{ label: 'Jumlah Mahasiswa Aktif', data: bulanValues, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.1 }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    
      // --- 2. PROSES CHART ANGKATAN ---
      let dataAngkatan = currentSheetData.pivotAngkatan;
      if (selectedProdi !== "ALL") {
        dataAngkatan = dataAngkatan.filter(item => item["Program Studi"] === selectedProdi);
      } else {
        dataAngkatan = dataAngkatan.filter(item => item["Program Studi"] && item["Program Studi"] !== "Grand Total");
      }
    
      const angkatanKeys = Object.keys(dataAngkatan[0]).filter(key => key !== "Program Studi");
      const angkatanValues = angkatanKeys.map(key => {
        return dataAngkatan.reduce((sum, item) => sum + Number(item[key] || 0), 0);
      });
    
      if (chartAngkatanInstance) chartAngkatanInstance.destroy();
      const ctxAngkatan = document.getElementById('chartAngkatan').getContext('2d');
      chartAngkatanInstance = new Chart(ctxAngkatan, {
        type: 'bar',
        data: {
          labels: angkatanKeys,
          datasets: [{ label: 'Jumlah Mahasiswa', data: angkatanValues, backgroundColor: '#10b981' }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Jalankan saat halaman dimuat
    fetchData();
  </script>
</body>
</html>
