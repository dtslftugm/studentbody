<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Mahasiswa Aktif</title>
  <!-- Tailwind CSS untuk tampilan elegan -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Chart.js untuk visualisasi grafik interaktif -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

  <div class="container mx-auto p-6 max-w-6xl">
    <!-- Header -->
    <header class="mb-8 border-b pb-4">
      <h1 class="text-3xl font-extrabold text-blue-900">Dashboard Mahasiswa Aktif</h1>
      <p class="text-slate-500">Visualisasi data interaktif dari Google Sheets</p>
    </header>

    <!-- Filter Interaktif -->
    <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-wrap gap-4 items-center">
      <div>
        <label class="block text-sm font-semibold text-slate-600 mb-1">Pilih Program Studi:</label>
        <select id="prodiFilter" class="border rounded-lg px-3 py-2 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" onchange="updateCharts()">
          <option value="ALL">Semua Program Studi</option>
        </select>
      </div>
    </div>

    <!-- Grid Visualisasi -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Card Chart Bulan -->
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <h2 class="text-lg font-bold text-slate-700 mb-4">Tren Pendaftaran per Bulan</h2>
        <div class="h-80">
          <canvas id="chartBulan"></canvas>
        </div>
      </div>

      <!-- Card Chart Angkatan -->
      <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
        <h2 class="text-lg font-bold text-slate-700 mb-4">Distribusi per Angkatan</h2>
        <div class="h-80">
          <canvas id="chartAngkatan"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // MASUKKAN URL WEB APP APPS SCRIPT 
    const API_URL = "https://script.google.com/macros/s/AKfycbw05wuT_uScyhFKDWjx9kXvTPSqhH8lBUtHjX4gFtwFS02GWb7_VAsCn10wsVqxcE8X/exec"; 

    let globalData = null;
    let chartBulanInstance = null;
    let chartAngkatanInstance = null;

async function fetchData() {
  try {
    // Tambahkan properti redirect: 'follow' untuk menangani sistem keamanan Google
    const response = await fetch(API_URL, {
      method: 'GET',
      redirect: 'follow' 
    });
    
    globalData = await response.json();
    
    // Validasi apakah data berhasil diterima
    if (globalData.error) {
      console.error("Error dari Apps Script:", globalData.error);
      return;
    }

    const prodiSelect = document.getElementById('prodiFilter');
    const prodis = globalData.pivotBulan.map(item => item["Program Studi"]);
    
    // Kosongkan dropdown terlebih dahulu kecuali opsi pertama
    prodiSelect.innerHTML = '<option value="ALL">Semua Program Studi</option>';
    
    prodis.forEach(prodi => {
      if(prodi) { // pastikan nama prodi tidak kosong
        const option = document.createElement('option');
        option.value = prodi;
        option.textContent = prodi;
        prodiSelect.appendChild(option);
      }
    });

    updateCharts();
  } catch (error) {
    console.error("Gagal mengambil data dari API:", error);
  }
}
    

    function updateCharts() {
      if (!globalData) return;

      const selectedProdi = document.getElementById('prodiFilter').value;

      // 1. Proses Data Chart Bulan
      let dataBulan = globalData.pivotBulan;
      if (selectedProdi !== "ALL") {
        dataBulan = dataBulan.filter(item => item["Program Studi"] === selectedProdi);
      }
      
      // Ambil label bulan (Agustus, September, dll)
      const bulanKeys = Object.keys(dataBulan[0]).filter(key => key !== "Program Studi");
      
      // Jumlahkan nilai per bulan berdasarkan filter
      const bulanValues = bulanKeys.map(key => {
        return dataBulan.reduce((sum, item) => sum + Number(item[key] || 0), 0);
      });

      // Render/Update Chart Bulan
      if (chartBulanInstance) chartBulanInstance.destroy();
      const ctxBulan = document.getElementById('chartBulan').getContext('2d');
      chartBulanInstance = new Chart(ctxBulan, {
        type: 'line',
        data: {
          labels: bulanKeys,
          datasets: [{
            label: 'Jumlah Mahasiswa',
            data: bulanValues,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            fill: true,
            tension: 0.3
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

      // 2. Proses Data Chart Angkatan
      let dataAngkatan = globalData.pivotAngkatan;
      if (selectedProdi !== "ALL") {
        dataAngkatan = dataAngkatan.filter(item => item["Program Studi"] === selectedProdi);
      }

      const angkatanKeys = Object.keys(dataAngkatan[0]).filter(key => key !== "Program Studi");
      const angkatanValues = angkatanKeys.map(key => {
        return dataAngkatan.reduce((sum, item) => sum + Number(item[key] || 0), 0);
      });

      // Render/Update Chart Angkatan
      if (chartAngkatanInstance) chartAngkatanInstance.destroy();
      const ctxAngkatan = document.getElementById('chartAngkatan').getContext('2d');
      chartAngkatanInstance = new Chart(ctxAngkatan, {
        type: 'bar',
        data: {
          labels: angkatanKeys,
          datasets: [{
            label: 'Jumlah Mahasiswa',
            data: angkatanValues,
            backgroundColor: '#10b981'
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    // Jalankan saat halaman dimuat
    fetchData();
  </script>
</body>
</html>
